<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulgarian Trainer — A1 to B1</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Bulgarian for real life + work</p>
        <h1>Bulgarian Trainer</h1>
        <p class="subhead">Learn practical Bulgarian for daily use, work, travel, and mechanic tasks — with quizzes, listening, speaking, and evaluation.</p>
      </div>
      <div class="hero-meta">
        <div class="pill">Goal: B1</div>
        <div class="pill">500+ words</div>
        <div class="pill">300+ verbs</div>
      </div>
    </header>

    <nav class="nav">
      <button data-nav="dashboard" class="nav-btn active">Dashboard</button>
      <button data-nav="words" class="nav-btn">Words</button>
      <button data-nav="verbs" class="nav-btn">Verbs</button>
      <button data-nav="daily" class="nav-btn">Daily session</button>
      <button data-nav="practice" class="nav-btn">Practice quiz</button>
      <button data-nav="listening" class="nav-btn">Listening</button>
      <button data-nav="speaking" class="nav-btn">Speaking</button>
      <button data-nav="reading" class="nav-btn">Reading</button>
      <button data-nav="evaluation" class="nav-btn">Evaluation</button>
      <button data-nav="progress" class="nav-btn">Progress</button>
    </nav>

    <main id="app" class="app"></main>

    <footer class="footer">
      Built for GitHub Pages. Use Chrome for speaking and audio.
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
